# ============================================
# SSH 安全加固配置
# ============================================

# ---- 网络与端口 ----
# 修改默认 SSH 端口（减噪，削弱/过滤自动化扫描）
Port 8989

# 仅监听指定 IPv4 地址（推荐绑定内网管理网卡），防止外网直接扫描
ListenAddress 0.0.0.0

# ---- 认证方式 ----
# 禁止 root 直接登录
PermitRootLogin no

# 启用公钥认证
PubkeyAuthentication yes

# 禁用密码登录
PasswordAuthentication no

# 禁用键盘交互认证
ChallengeResponseAuthentication no

# 禁用 GSSAPI 认证（如不需要 Kerberos）
GSSAPIAuthentication no

# 指定 authorized_keys 文件路径
AuthorizedKeysFile .ssh/authorized_keys

# ---- 连接限制与速率控制 ----
# 最大认证尝试次数，超过则断开连接
MaxAuthTries 3

# 最大同时未认证连接数（start:rate:full），限制未认证连接数量并逐步拒绝更多连接尝试
MaxStartups 10:30:60

# 登录超时时间（秒），超过未完成认证则断开（缓解 CVE-2025-26466 内存消耗）
LoginGraceTime 30s

# 最大并发会话数（可选，限制单个连接的复用）
MaxSessions 6

# ---- 协议与算法强化 ----
# 仅使用 SSH 协议 v2
Protocol 2

# 客户端保活间隔（秒），减少僵尸连接
ClientAliveInterval 300

# 最大客户端无响应次数，超过则断开
ClientAliveCountMax 2

# ---- 性能优化 ----
# 关闭 DNS 反向解析，加速登录（尤其内网环境）
UseDNS no

# 禁用 TCP 转发（如需端口转发可移除）
AllowTcpForwarding yes

# 禁用 X11 转发（Web/数据库服务器无需图形转发）
X11Forwarding no

# 若需要 SFTP 文件传输，请保留此功能并注释下一条
# Subsystem sftp internal-sftp

# ---- 访问控制 ----
# 仅允许指定用户（推荐）
AllowUsers zhang

# 或仅允许指定用户组（与 AllowUsers 二选一）
# AllowGroups ssh-users wheel

# 禁止空密码登录
PermitEmptyPasswords no

# 禁止 .rhosts 和主机名认证（仅密钥+可插拔认证模块）
HostbasedAuthentication no
IgnoreRhosts yes

# ---- 日志 ----
# 日志级别（VERBOSE 记录登录指纹，便于审计）
LogLevel VERBOSE
