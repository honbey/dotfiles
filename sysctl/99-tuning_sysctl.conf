# /etc/sysctl.d/99-tuning_server.conf

# === 文件句柄与资源限制 ===
# 系统全局最大文件句柄数，支持海量并发连接
fs.file-max = 2097152

# 单进程最大文件打开数上限
fs.nr_open = 2097152

# 系统最大 PID 上限，高并发服务（含容器）需要足够大
kernel.pid_max = 4194304

# inotify 监听上限，容器监控大量文件时需提高（默认 8192 极易耗尽）
fs.inotify.max_user_watches = 524288

# user namespace 上限，容器运行需要足够数量
user.max_user_namespaces = 15000

# === 内存管理 ===
# 降低 Swap 使用倾向（0~100，越小越不倾向使用 swap），数据库服务器推荐 1~10
vm.swappiness = 10

# 减缓 dentry/inode 缓存回收速度，提升文件路径查找效率（默认 100，高 IO 服务可适当调低至 50）
vm.vfs_cache_pressure = 50

# 脏页后台刷盘阈值百分比，后台异步刷盘避免 IO 阻塞
vm.dirty_background_ratio = 5

# 脏页绝对上限百分比，达到后强制同步刷盘（SSD 可适当提高至 10~20）
vm.dirty_ratio = 10

# 系统预留最小空闲内存（KB），防止 OOM 时系统卡死
vm.min_free_kbytes = 262144

# 内存超提交策略：0=启发式（默认）、1=总是允许、2=禁止超量提交
# 数据库等内存敏感应用建议使用 2，配合 overcommit_ratio 精确控制
vm.overcommit_memory = 1

# === 网络核心 ===
# 全连接队列最大长度，高并发 Web 服务必须提高
net.core.somaxconn = 65535

# 网卡接收队列最大长度，应对短时流量尖峰
net.core.netdev_max_backlog = 5000

# TCP SYN 队列最大长度
net.ipv4.tcp_max_syn_backlog = 16384

# 接收/发送缓冲区最大值（单位：字节），配合 TCP 窗口自动缩放
net.core.rmem_max = 25165824
net.core.wmem_max = 25165824

# === TCP 协议栈 ===
# 启用 TCP 窗口自动缩放
net.ipv4.tcp_window_scaling = 1

# TCP 读写缓冲区（最小 默认 最大），系统按需动态分配
net.ipv4.tcp_rmem = 4096 65536 25165824
net.ipv4.tcp_wmem = 4096 65536 25165824

# 启用 TIME_WAIT 状态连接复用（客户端场景），缓解端口耗尽
net.ipv4.tcp_tw_reuse = 1

# 缩短 FIN_WAIT_2 超时（默认 60 秒），加快端口回收
net.ipv4.tcp_fin_timeout = 30

# TIME_WAIT 最大数量，超过此值直接销毁
net.ipv4.tcp_max_tw_buckets = 5000

# 启用 TCP Fast Open（3=客户端+服务端均启用），减少首次 HTTP 请求 RTT
net.ipv4.tcp_fastopen = 3

# TCP 保活相关参数：减小保活探测间隔，更快释放失效连接
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 3

# 本地端口范围扩展，避免高并发短连接场景下端口耗尽
net.ipv4.ip_local_port_range = 1024 65535

# 启用 BBR 拥塞控制算法（需内核支持，Linux 4.9+），提升吞吐并降低延迟
net.ipv4.tcp_congestion_control = bbr

# 配合 BBR 使用的排队规则
net.core.default_qdisc = fq

# === 内核安全加固 ===
# 启用 TCP SYN Cookie，防御 SYN Flood 攻击
net.ipv4.tcp_syncookies = 1

# 启用反向路径过滤，防止 IP 欺骗
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 禁止接受源路由包
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# 禁止接受 ICMP 重定向
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0

# 启用 Martian 源地址日志记录（可疑数据包日志）
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 忽略 ICMP 广播请求，防止 Smurf 攻击
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 忽略错误的 ICMP 响应
net.ipv4.icmp_ignore_bogus_error_responses = 1

# 不响应 ICMP Echo 请求（按需启用，隐藏服务器存在）
# net.ipv4.icmp_echo_ignore_all = 1

# IPv6 安全加固
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# 限制内核指针暴露（/proc/kallsyms 等），默认 2 = 完全隐藏
kernel.kptr_restrict = 2

# 限制 dmesg 访问，非 root 用户不可读取内核日志（防信息泄露）
kernel.dmesg_restrict = 1

# 禁止非特权用户使用 BPF（防止 eBPF 相关攻击）
kernel.unprivileged_bpf_disabled = 1

# 加固 BPF JIT 引擎（仅部分架构支持）
net.core.bpf_jit_harden = 2

# 开启 ASLR 地址空间布局随机化（2 = 完全随机化）
kernel.randomize_va_space = 2

# 禁用非特权用户创建 user namespace（容器宿主除外，如不需要容器可用 0）
kernel.unprivileged_userns_clone = 0

